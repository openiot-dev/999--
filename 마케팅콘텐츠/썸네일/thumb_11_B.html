<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@500;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1280px; height:720px; overflow:hidden; }
.stage{
  position:relative; width:1280px; height:720px;
  background:
    radial-gradient(820px 560px at 20% 16%, rgba(47,209,122,.16), transparent 60%),
    radial-gradient(760px 560px at 94% 88%, rgba(35,90,170,.30), transparent 60%),
    linear-gradient(135deg,#0a1020 0%, #0e1626 45%, #121d31 100%);
  font-family:'Noto Sans KR',sans-serif; color:#fff; overflow:hidden;
}
.stage::before{
  content:""; position:absolute; inset:0;
  background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);
  background-size:48px 48px; mask-image:linear-gradient(200deg,transparent,#000 70%);
}
.kicker{ position:absolute; top:56px; left:64px; }
.kicker .pill{ background:#10233f; border:2px solid rgba(47,209,122,.6); color:#5FE3A1;
  font-weight:900; font-size:30px; letter-spacing:-.5px; padding:12px 24px; border-radius:999px; }
.head{ position:absolute; left:60px; top:188px; line-height:.98;
  font-family:'Black Han Sans',sans-serif; letter-spacing:-1px;
  text-shadow:0 10px 34px rgba(0,0,0,.55); }
.head .l1{ font-size:92px; color:#fff; }
.head .l1 b{ color:#FFB020; }
.head .l2{ font-size:176px; color:#fff; }
.head .l2 .zero{ color:#5FE3A1; }
.note{ position:absolute; left:66px; top:566px; font-weight:900; font-size:44px;
  color:#fff; letter-spacing:-1px; }
.note b{ color:#5FE3A1; }
/* right: price flip card */
.flip{ position:absolute; right:70px; top:172px; width:392px; text-align:center; }
.flip .old{
  position:relative; display:inline-block; font-family:'Black Han Sans',sans-serif;
  font-size:96px; color:#9aa7bb; letter-spacing:-2px; line-height:1;
}
.flip .old::after{ content:""; position:absolute; left:-10px; right:-10px; top:52%;
  height:12px; background:#FF4D4D; transform:rotate(-8deg); border-radius:6px;
  box-shadow:0 4px 14px rgba(255,77,77,.5); }
.flip .oldcap{ font-weight:700; font-size:30px; color:#7f8aa0; letter-spacing:-.5px; margin-top:8px; }
.flip .arrow{ font-size:72px; color:#5FE3A1; margin:14px 0 6px; line-height:1; font-weight:900; }
.flip .new{
  display:inline-block; font-family:'Black Han Sans',sans-serif; font-size:150px;
  color:#5FE3A1; letter-spacing:-3px; line-height:1;
  text-shadow:0 0 40px rgba(47,209,122,.45);
}
.flip .newcap{ display:inline-block; margin-top:14px; background:#1FA86B; color:#fff;
  font-weight:900; font-size:34px; letter-spacing:-.5px; padding:10px 26px; border-radius:999px;
  box-shadow:0 8px 24px rgba(31,168,107,.5); }
.brand{ position:absolute; left:64px; bottom:40px; display:flex; align-items:center; gap:18px; }
.brand .logo{ display:flex; align-items:center; gap:12px; }
.brand .dot{ width:26px; height:26px; border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#5FE3A1,#1FA86B); box-shadow:0 0 18px rgba(47,209,122,.6); }
.brand .name{ font-weight:900; font-size:34px; letter-spacing:-.5px; }
.brand .name .o{ color:#fff; } .brand .name .i{ color:#5FE3A1; }
.brand .sep{ width:2px; height:30px; background:rgba(255,255,255,.2); }
.brand .badge{ font-weight:700; font-size:27px; color:#c6cfde; letter-spacing:-.5px; }
.brand .badge b{ color:#fff; }
</style>
</head>
<body>
<div class="stage">
  <div class="kicker"><span class="pill">IoT 풀커스텀의 역설</span></div>

  <div class="head">
    <div class="l1">비싼 이유는 <b>그대로</b>,</div>
    <div class="l2">가격만 <span class="zero">0원</span></div>
  </div>

  <div class="note">빠진 줄 하나 없이 <b>다 넣었습니다</b></div>

  <div class="flip">
    <div class="old">수천만 원</div>
    <div class="oldcap">처음부터 직접 개발</div>
    <div class="arrow">▼</div>
    <div class="new">0원</div>
    <div class="newcap">칩만 연결 · 3분 시작</div>
  </div>

  <div class="brand">
    <span class="logo"><span class="dot"></span><span class="name"><span class="o">open</span><span class="i">IoT</span></span></span>
    <span class="sep"></span>
    <span class="badge">IoT 외주 받는 회사가 <b>직접</b></span>
  </div>
</div>
</body>
</html>
